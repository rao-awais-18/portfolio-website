<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rao Awais | Full Stack Developer</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="navbar-container"></div>

<main>

    <!-- ==========================
         Projects Hero
    =========================== -->

    <section class="projects-hero reveal">

        <div class="container">

            <div class="section-header">

                <span class="section-tag">

                    <h2>My Projects</h2>

                </span>

                <h3>

                    Projects Portfolio

                </h3>

                <p>

                    A collection of projects showcasing my skills, creativity, and problem-solving approach.

                </p>

            </div>

        </div>

    </section>


<!-- =========================== search =================== -->

    <section class="projects-search">

    <div class="container">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="project-search"
                placeholder="Search projects..."
            >

        </div>

    </div>

</section>

<!-- search result count -->
<div class="projects-info">

    <p id="projects-count">

        Showing 0 Projects

    </p>

</div>

    <!-- ==========================
         Filters
    =========================== -->

    <section class="projects-filter">

        <div class="container">

            <div id="filter-buttons">

            </div>

        </div>

    </section>

    <!-- ==========================
         Projects Grid
    =========================== -->

    <section class="projects-section reveal">

        <div class="container">

            <div

                id="projects-grid"

                class="projects-grid"

            >

            </div>

        </div>

    </section>

</main>


    <!-- footer -->
    <footer id="footer-container"></footer>

    <script src="js/navbar.js"></script>
    
    <script src="js/projects.js"></script>

    <script src="js/script.js"></script>

    <script src="js/projects-page.js"></script>
    
    <script src="js/footer.js"></script>
    
    <script src="js/scroll-reveal.js"></script>

  </body>

</html>
