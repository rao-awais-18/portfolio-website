<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rao Awais | Full Stack Developer</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div id="navbar-container"></div>

    <main>
      <!-- Project Hero -->
      <section class="project-hero">
        <div class="container">
          <div id="project-hero"></div>
        </div>
      </section>

      <!-- Overview -->
      <section class="project-overview">
        <div class="container">
          <div id="project-overview"></div>
        </div>
      </section>

      <!-- Gallery -->
      <section class="project-gallery">
        <div class="container">
          <div id="project-gallery"></div>
        </div>
      </section>

      <!-- Technologies -->
      <section class="project-technologies">
        <div class="container">
          <div id="project-technologies"></div>
        </div>
      </section>

      <!-- Features -->
      <section class="project-features">
        <div class="container">
          <div id="project-features"></div>
        </div>
      </section>

      <!-- Project Information -->
      <section class="project-information">
        <div class="container">
          <div id="project-information"></div>
        </div>
      </section>

      <!-- Previous / Next -->
      <section class="project-navigation">
        <div class="container">
          <div id="project-navigation"></div>
        </div>
      </section>

      
    </main>

    <!-- ==========================
     Lightbox
========================== -->

<div class="lightbox" id="lightbox">

  <button class="lightbox-close" id="lightbox-close">

    <i class="fa-solid fa-xmark"></i>

  </button>

  <button class="lightbox-arrow lightbox-prev" id="lightbox-prev">

    <i class="fa-solid fa-chevron-left"></i>

  </button>

  <img id="lightbox-image" alt="Project Screenshot" />

  <button class="lightbox-arrow lightbox-next" id="lightbox-next">

    <i class="fa-solid fa-chevron-right"></i>

  </button>

  <div class="lightbox-counter" id="lightbox-counter">
    
  </div>

</div>

<!-- CTA -->

<section class="project-cta">

    <div class="container">

        <div id="project-cta"></div>

    </div>

</section>

    <!-- footer -->
    <footer id="footer-container"></footer>

    <script src="js/navbar.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/project-details.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/script.js"></script>

    <script src="js/footer.js"></script>
  </body>
</html>
