<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rao Awais | Full Stack Developer</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar-container"></div>

    <!-- skill hero section -->
<section class="skills-hero">

    <div class="container">

        <span class="section-tag">

            My Expertise

        </span>

        <h1>

            My Skills

        </h1>

        <p>

            Technologies, frameworks, and tools that I've learned through continuous practice, university projects, and hands-on development.

        </p>

        <div class="hero-stats">

            <div class="hero-stat">

                <h3 id="skills-count-number">

                    0

                </h3>

                <span>

                    Skills

                </span>

            </div>

            <div class="hero-stat">

                <h3 id="categories-count">

                    0

                </h3>

                <span>

                    Categories

                </span>

            </div>

            <div class="hero-stat">

                <h3>

                    ∞

                </h3>

                <span>

                    Learning

                </span>

            </div>

        </div>

    </div>

</section>


<!-- ================================
        Search
================================ -->

<section class="skills-search">

    <div class="container">

        <div id="skills-search-bar"></div>

    </div>

</section>


<!-- ================================
        Skills Info
================================ -->

<section class="skills-info">

    <div class="container">

        <p id="skills-count"></p>

    </div>

</section>


<!-- ================================
        Filters
================================ -->

<section class="skills-filter">

    <div class="container">

        <div id="skills-filters"></div>

    </div>

</section>


<!-- ================================
        Sort + Reset
================================ -->

<section class="skills-sort">

    <div class="container">

        <div class="sort-wrapper">

            <select id="sort-skills">

                <option value="default">

                    Default

                </option>

                <option value="az">

                    A-Z

                </option>

                <option value="za">

                    Z-A

                </option>

            </select>

            <button id="reset-skills">

                <i class="fa-solid fa-rotate-left"></i>

                Reset

            </button>

        </div>

    </div>

</section>


<!-- ================================
        Skills Grid
================================ -->

<section class="skills-section">

    <div class="container">

        <div id="skills-grid">

            <!-- Dynamic JS -->

        </div>

    </div>

</section>



    <!-- footer -->
    <footer id="footer-container"></footer>


<!-- scripts import -->
    <script src="js/navbar.js"></script>

    <script src="js/footer.js"></script>

    <script src="js/skills.js"></script>

    <script src="js/script.js"></script>

    <script src="js/skills-page.js"></script>

    <script src="js/scroll-reveal.js"></script>
  </body>
</html>
